<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual IQ</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ─── TOKENS ──────────────────────────────────────────────── */
    :root {
      --bg:         #0d0f14;
      --surface:    #141720;
      --surface-2:  #1c2030;
      --border:     #252a3a;
      --accent:     #5b8dee;
      --accent-glow:#5b8dee33;
      --gold:       #f5c842;
      --gold-dim:   #f5c84222;
      --text:       #e8eaf0;
      --text-muted: #7c849a;
      --text-faint: #454c63;
      --danger:     #e05252;
      --success:    #4ecb8d;

      /* Subject palette */
      --sports:     #5b8dee;
      --affairs:    #e05252;
      --arts:       #b06be0;
      --theatre:    #e07a30;
      --cinema:     #e0c030;
      --science:    #4ecb8d;
      --other:      #7c849a;

      --radius:     12px;
      --radius-sm:  6px;
      --card-w:     300px;
      --transition: 0.22s ease;
    }

    /* ─── RESET ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { display: block; }

    /* ─── HEADER ──────────────────────────────────────────────── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 60px;
      backdrop-filter: blur(12px);
    }
    .app-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .logo-text {
      font-family: 'Crimson Pro', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .logo-text span { color: var(--accent); }

    .header-search {
      flex: 1;
      max-width: 380px;
      margin-left: auto;
      position: relative;
    }
    .header-search input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 7px 36px 7px 12px;
      outline: none;
      transition: border-color var(--transition);
    }
    .header-search input::placeholder { color: var(--text-faint); }
    .header-search input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      pointer-events: none;
      font-size: 14px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .btn-icon {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all var(--transition);
    }
    .btn-icon:hover { color: var(--text); border-color: var(--accent); }
    .btn-icon.active { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }

    /* ─── LAYOUT ──────────────────────────────────────────────── */
    .app-body {
      display: flex;
      height: calc(100vh - 60px);
    }

    /* ─── SIDEBAR ─────────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      overflow-y: auto;
      transition: width var(--transition);
    }
    .sidebar.collapsed { width: 0; overflow: hidden; padding: 0; }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 0 16px 8px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      border-left: 2px solid transparent;
      transition: all var(--transition);
      white-space: nowrap;
      overflow: hidden;
    }
    .sidebar-item:hover { color: var(--text); background: var(--surface-2); }
    .sidebar-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--accent-glow);
    }
    .sidebar-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sidebar-count {
      margin-left: auto;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface-2);
      padding: 1px 6px;
      border-radius: 10px;
      color: var(--text-faint);
      flex-shrink: 0;
    }
    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 16px;
    }

    /* ─── MAIN CONTENT ────────────────────────────────────────── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ─── FILTER BAR ──────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 12px;
      color: var(--text-faint);
      font-weight: 500;
      margin-right: 4px;
    }
    .filter-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }
    .pill {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .pill:hover { color: var(--text); border-color: var(--text-muted); }
    .pill.active {
      color: #fff;
      border-color: transparent;
    }

    /* Sort + View controls */
    .view-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: auto;
    }
    .sort-select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      cursor: pointer;
    }
    .sort-select:focus { border-color: var(--accent); }

    /* ─── STATS BAR ───────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .stat-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* ─── SECTION HEADING ─────────────────────────────────────── */
    .section-heading {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-heading h2 {
      font-family: 'Crimson Pro', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
    }
    .section-count {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
    }

    /* ─── GALLERY GRID ────────────────────────────────────────── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
      gap: 18px;
    }
    .gallery-grid.list-view {
      grid-template-columns: 1fr;
    }

    /* ─── CARD ────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: visible;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      position: relative;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(91,141,238,0.15);
    }
    .card.known { border-color: var(--success); }
    .card.known::after {
      content: '✓';
      position: absolute;
      top: 8px; right: 8px;
      background: var(--success);
      color: #000;
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      z-index: 2;
    }
    .card.review { border-color: var(--gold); }
    .card.review::after {
      content: '★';
      position: absolute;
      top: 8px; right: 8px;
      background: var(--gold);
      color: #000;
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      z-index: 2;
    }

    .card-image-wrap {
      position: relative;
      width: 100%;
      padding-top: 68%;
      background: var(--surface-2);
      overflow: hidden;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .card-image-wrap img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: top center;
      transition: transform 0.4s ease;
    }
    .card:hover .card-image-wrap img { transform: scale(1.04); }

    .card-img-error {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-faint);
      font-size: 13px;
    }
    .card-img-error .err-icon { font-size: 28px; }

    .card-skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .subject-badge {
      position: absolute;
      bottom: 8px; left: 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      color: #fff;
      z-index: 2;
    }

    .card-body {
      padding: 14px 14px 12px;
    }
    .card-name {
      font-family: 'Crimson Pro', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-meta span {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      padding: 0 14px 12px;
    }
    .card-btn {
      flex: 1;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
    }
    .card-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .card-btn.btn-known { border-color: var(--success); color: var(--success); }
    .card-btn.btn-review { border-color: var(--gold); color: var(--gold); }

    /* List view card layout */
    .gallery-grid.list-view .card {
      display: flex;
      flex-direction: row;
      align-items: stretch;
    }
    .gallery-grid.list-view .card-image-wrap {
      width: 120px;
      min-width: 120px;
      padding-top: 0;
      height: 100px;
      border-radius: var(--radius) 0 0 var(--radius);
    }
    .gallery-grid.list-view .card-body { flex: 1; }
    .gallery-grid.list-view .card-actions { flex-direction: column; justify-content: center; padding: 12px 14px; }

    /* ─── INFO PANEL (floating) ───────────────────────────────── */
    .info-panel {
      position: fixed;
      z-index: 500;
      width: 340px;
      max-height: 80vh;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--accent-glow);
      overflow: hidden;
      display: none;
      flex-direction: column;
      pointer-events: none;
      transition: opacity 0.18s ease;
      opacity: 0;
    }
    .info-panel.visible {
      display: flex;
      opacity: 1;
      pointer-events: auto;
      animation: panelIn 0.18s ease;
    }
    .info-panel.pinned {
      border-color: var(--accent);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px var(--accent);
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .info-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      flex-shrink: 0;
    }
    .info-panel-title {
      font-family: 'Crimson Pro', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .info-panel-controls {
      display: flex;
      gap: 4px;
    }
    .panel-ctrl {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      width: 26px; height: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all var(--transition);
    }
    .panel-ctrl:hover { color: var(--text); border-color: var(--text-muted); }
    .panel-ctrl.pin-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .info-panel-body {
      overflow-y: auto;
      padding: 14px;
      flex: 1;
    }
    .info-panel-body::-webkit-scrollbar { width: 4px; }
    .info-panel-body::-webkit-scrollbar-track { background: transparent; }
    .info-panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Markdown rendered inside panel */
    .info-panel-body h1,
    .info-panel-body h2,
    .info-panel-body h3 {
      font-family: 'Crimson Pro', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .info-panel-body p { font-size: 13px; color: var(--text); margin-bottom: 10px; line-height: 1.65; }
    .info-panel-body a { color: var(--accent); }
    .info-panel-body ul, .info-panel-body ol {
      font-size: 13px;
      color: var(--text);
      padding-left: 18px;
      margin-bottom: 10px;
    }
    .info-panel-body li { margin-bottom: 4px; }
    .info-panel-body strong { color: var(--text); font-weight: 600; }
    .info-panel-body em { color: var(--text-muted); font-style: italic; }
    .info-panel-body code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: var(--surface-2);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ─── LIGHTBOX ────────────────────────────────────────────── */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      z-index: 900;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .lightbox-overlay.visible { display: flex; }

    .lightbox-inner {
      display: flex;
      gap: 24px;
      max-width: 90vw;
      max-height: 90vh;
      align-items: flex-start;
    }
    .lightbox-img-wrap {
      flex-shrink: 0;
      max-width: 55vw;
      max-height: 85vh;
      position: relative;
    }
    .lightbox-img-wrap img {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    }
    .lightbox-info {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 85vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .lightbox-info-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .lightbox-name {
      font-family: 'Crimson Pro', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .lightbox-subject {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .lightbox-info-body {
      padding: 14px 16px;
      flex: 1;
      overflow-y: auto;
      font-size: 13px;
      color: var(--text);
    }
    .lightbox-info-body h1,
    .lightbox-info-body h2,
    .lightbox-info-body h3 {
      font-family: 'Crimson Pro', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    .lightbox-info-body p { margin-bottom: 10px; line-height: 1.65; }
    .lightbox-info-body a { color: var(--accent); }
    .lightbox-info-body ul, .lightbox-info-body ol { padding-left: 18px; margin-bottom: 10px; }
    .lightbox-info-body li { margin-bottom: 4px; }

    .lightbox-controls {
      position: absolute;
      top: 50%;
      left: -52px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .lb-nav {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      width: 38px; height: 38px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: all var(--transition);
    }
    .lb-nav:hover { color: var(--text); border-color: var(--accent); }

    .lightbox-close {
      position: fixed;
      top: 20px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      z-index: 901;
      transition: all var(--transition);
    }
    .lightbox-close:hover { color: var(--text); border-color: var(--danger); color: var(--danger); }

    /* lightbox meta row */
    .lightbox-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .lightbox-meta-chip {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      color: var(--text-faint);
    }
    .lightbox-img-source {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }
    .src-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .src-btn:hover { border-color: var(--accent); color: var(--accent); }
    .src-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    /* ─── FLASHCARD MODE ──────────────────────────────────────── */
    .flashcard-overlay {
      position: fixed;
      inset: 0;
      z-index: 800;
      background: var(--bg);
      display: none;
      flex-direction: column;

<!-- ═══ SCRIPT ══════════════════════════════════════════════════ -->
<script>
/* ─── CONFIG ──────────────────────────────────────────────────── */
const DATA_URL = './visuals.json';

/* ─── Subject colour map ──────────────────────────────────────── */
const SUBJECT_COLORS = {
  'sports':                    '#5b8dee',
  'local and international':   '#e05252',
  'local':                     '#e05252',
  'international':              '#e05252',
  'affairs':                   '#e05252',
  'art':                       '#b06be0',
  'arts':                      '#b06be0',
  'theatre':                   '#e07a30',
  'cinema':                    '#e0c030',
  'science':                   '#4ecb8d',
  'technology':                '#4ecb8d',
  'history':                   '#a0826d',
  'geography':                 '#62b3a0',
  'music':                     '#d47bb0',
};

function subjectColor(subject) {
  if (!subject) return '#7c849a';
  const key = subject.toLowerCase();
  for (const k in SUBJECT_COLORS) {
    if (key.includes(k)) return SUBJECT_COLORS[k];
  }
  return '#7c849a';
}

/* ─── STATE ───────────────────────────────────────────────────── */
let allData        = [];
let filteredData   = [];
let activeSubject  = 'all';
let activeRound    = 'all';
let activeProgress = 'all';
let isListView     = false;
let isNamesHidden  = false;
let isShuffled     = false;
let searchQuery    = '';
let sortMode       = 'default';
let progress       = {};   // { pkey: 'known' | 'review' }

/* Info panel state */
let infoPanelPinned  = false;
let infoPanelVisible = false;
let hideTimer        = null;

/* Lightbox state */
let lbIndex          = 0;
let lbUseLocal       = false;

/* Flashcard state */
let fcDeck   = [];
let fcIndex  = 0;
let fcKnew   = 0;
let fcMissed = 0;
let fcRevealed = false;

/* ─── STORAGE ─────────────────────────────────────────────────── */
function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem('viq_progress') || '{}'); }
  catch { progress = {}; }
}
function saveProgress() {
  localStorage.setItem('viq_progress', JSON.stringify(progress));
}
function setProgress(pkey, state) {
  if (progress[pkey] === state) {
    delete progress[pkey];
  } else {
    progress[pkey] = state;
  }
  saveProgress();
  refreshCards();
  updateStats();
  updateSidebarCounts();
}

/* ─── FETCH DATA ──────────────────────────────────────────────── */
async function fetchData() {
  try {
    const res = await fetch(DATA_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    allData = Array.isArray(json) ? json : (json.data || json.entries || []);
    toast('Loaded ' + allData.length + ' entries', 'info');
  } catch (e) {
    allData = getSampleData();
    toast('Could not load visuals.json — showing sample data', 'info');
  }
  buildSubjectFilters();
  buildRoundFilters();
  applyFilters();
  updateStats();
}

/* ─── FILTER + SORT ───────────────────────────────────────────── */
function applyFilters() {
  let data = [...allData];

  // Subject
  if (activeSubject !== 'all') {
    data = data.filter(d => (d.Subject || '').toLowerCase() === activeSubject.toLowerCase());
  }

  // Round
  if (activeRound !== 'all') {
    data = data.filter(d => String(d.Round) === String(activeRound));
  }

  // Progress
  if (activeProgress === 'known') {
    data = data.filter(d => progress[d.Pkey] === 'known');
  } else if (activeProgress === 'review') {
    data = data.filter(d => progress[d.Pkey] === 'review');
  }

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(d =>
      (d.Answer || '').toLowerCase().includes(q) ||
      (d.Subject || '').toLowerCase().includes(q) ||
      (d.Question || '').toLowerCase().includes(q)
    );
  }

  // Shuffle
  if (isShuffled) data = shuffle(data);

  // Sort
  if (!isShuffled) {
    if (sortMode === 'name')    data.sort((a, b) => (a.Answer || '').localeCompare(b.Answer || ''));
    if (sortMode === 'subject') data.sort((a, b) => (a.Subject || '').localeCompare(b.Subject || ''));
    if (sortMode === 'year')    data.sort((a, b) => String(a.Year || '').localeCompare(String(b.Year || '')));
  }

  filteredData = data;
  renderGallery();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ─── GALLERY RENDER ──────────────────────────────────────────── */
function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  const empty = document.getElementById('emptyState');
  const sectionCount = document.getElementById('sectionCount');
  const sectionTitle = document.getElementById('sectionTitle');

  if (filteredData.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    sectionCount.textContent = '';
    return;
  }
  empty.style.display = 'none';
  sectionCount.textContent = filteredData.length + ' items';

  // Title
  if (activeSubject !== 'all') sectionTitle.textContent = activeSubject;
  else if (activeProgress !== 'all') sectionTitle.textContent = activeProgress === 'known' ? 'Known' : 'Review Later';
  else sectionTitle.textContent = 'All Visuals';

  grid.innerHTML = '';
  filteredData.forEach((item, idx) => {
    const card = buildCard(item, idx);
    grid.appendChild(card);
  });

  if (isNamesHidden) grid.classList.add('name-hidden');
  else grid.classList.remove('name-hidden');
}

function buildCard(item, idx) {
  const pkey = item.Pkey;
  const prog = progress[pkey];
  const color = subjectColor(item.Subject);

  const card = document.createElement('div');
  card.className = 'card' + (prog ? ' ' + prog : '');
  card.dataset.idx = idx;

  // Image
  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-image-wrap';

  const skel = document.createElement('div');
  skel.className = 'card-skeleton';
  imgWrap.appendChild(skel);

  const img = document.createElement('img');
  img.alt = item.Answer || '';
  img.style.display = 'none';

  const tryLoad = (url, fallback) => {
    img.onload = () => { skel.remove(); img.style.display = ''; };
    img.onerror = () => {
      if (fallback) { img.src = fallback; img.onerror = () => showImgError(imgWrap, skel, img); }
      else showImgError(imgWrap, skel, img);
    };
    img.src = url;
  };
  tryLoad(item.LocalImageUrl || item.ImageUrl, item.LocalImageUrl ? item.ImageUrl : null);
  imgWrap.appendChild(img);

  // Badge
  const badge = document.createElement('div');
  badge.className = 'subject-badge';
  badge.textContent = item.Subject || '';
  badge.style.background = color + 'cc';
  imgWrap.appendChild(badge);

  card.appendChild(imgWrap);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = item.Answer || '—';
  body.appendChild(name);

  const meta = document.createElement('div');
  meta.className = 'card-meta';
  if (item.Year)    meta.innerHTML += `<span>📅 ${item.Year}</span>`;
  if (item.Round)   meta.innerHTML += `<span>R${item.Round}</span>`;
  if (item.Section) meta.innerHTML += `<span>§ ${item.Section}</span>`;
  body.appendChild(meta);
  card.appendChild(body);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'card-actions';

  const knownBtn = document.createElement('button');
  knownBtn.className = 'card-btn' + (prog === 'known' ? ' btn-known' : '');
  knownBtn.textContent = prog === 'known' ? '✓ Known' : 'Known';
  knownBtn.onclick = (e) => { e.stopPropagation(); setProgress(pkey, 'known'); };

  const reviewBtn = document.createElement('button');
  reviewBtn.className = 'card-btn' + (prog === 'review' ? ' btn-review' : '');
  reviewBtn.textContent = prog === 'review' ? '★ Review' : 'Review';
  reviewBtn.onclick = (e) => { e.stopPropagation(); setProgress(pkey, 'review'); };

  const viewBtn = document.createElement('button');
  viewBtn.className = 'card-btn';
  viewBtn.textContent = '🔍 View';
  viewBtn.onclick = (e) => { e.stopPropagation(); openLightbox(idx); };

  actions.appendChild(knownBtn);
  actions.appendChild(reviewBtn);
  actions.appendChild(viewBtn);
  card.appendChild(actions);

  // Info panel on hover (only if Info exists)
  if (item.Info) {
    card.addEventListener('mouseenter', (e) => showInfoPanel(item, e));
    card.addEventListener('mousemove',  (e) => positionInfoPanel(e));
    card.addEventListener('mouseleave', () => scheduleHidePanel());
  }

  // Lightbox on click
  card.addEventListener('click', () => openLightbox(idx));

  return card;
}

function showImgError(wrap, skel, img) {
  skel.remove();
  img.style.display = 'none';
  const err = document.createElement('div');
  err.className = 'card-img-error';
  err.innerHTML = `<span class="err-icon">🖼</span><span>Image unavailable</span>`;
  wrap.appendChild(err);
}

function refreshCards() {
  renderGallery();
}

/* ─── INFO PANEL ──────────────────────────────────────────────── */
const infoPanel      = document.getElementById('infoPanel');
const infoPanelTitle = document.getElementById('infoPanelTitle');
const infoPanelBody  = document.getElementById('infoPanelBody');
const pinBtn         = document.getElementById('pinBtn');
const closePanelBtn  = document.getElementById('closePanelBtn');

function showInfoPanel(item, e) {
  if (infoPanelPinned) return;
  clearTimeout(hideTimer);
  infoPanelTitle.textContent = item.Answer || 'Info';
  infoPanelBody.innerHTML = marked.parse(item.Info);
  positionInfoPanel(e);
  infoPanel.classList.add('visible');
  infoPanelVisible = true;
}

function positionInfoPanel(e) {
  if (infoPanelPinned) return;
  const panelW = 340, panelH = 360;
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = e.clientX + 16;
  let y = e.clientY + 16;
  if (x + panelW > vw - 8) x = e.clientX - panelW - 16;
  if (y + panelH > vh - 8) y = e.clientY - panelH - 16;
  infoPanel.style.left = Math.max(8, x) + 'px';
  infoPanel.style.top  = Math.max(8, y) + 'px';
}

function scheduleHidePanel() {
  if (infoPanelPinned) return;
  hideTimer = setTimeout(() => {
    infoPanel.classList.remove('visible');
    infoPanelVisible = false;
  }, 300);
}

infoPanel.addEventListener('mouseenter', () => clearTimeout(hideTimer));
infoPanel.addEventListener('mouseleave', () => scheduleHidePanel());

pinBtn.addEventListener('click', () => {
  infoPanelPinned = !infoPanelPinned;
  pinBtn.classList.toggle('active', infoPanelPinned);
  infoPanel.classList.toggle('pinned', infoPanelPinned);
  if (!infoPanelPinned) scheduleHidePanel();
});

closePanelBtn.addEventListener('click', () => {
  infoPanelPinned = false;
  infoPanel.classList.remove('visible', 'pinned');
  pinBtn.classList.remove('active');
  infoPanelVisible = false;
});

/* ─── LIGHTBOX ────────────────────────────────────────────────── */
const lightboxOverlay = document.getElementById('lightboxOverlay');
const lightboxImg     = document.getElementById('lightboxImg');
const lbName          = document.getElementById('lbName');
const lbSubject       = document.getElementById('lbSubject');
const lbMeta          = document.getElementById('lbMeta');
const lbInfoBody      = document.getElementById('lbInfoBody');

function openLightbox(idx) {
  lbIndex = idx;
  lbUseLocal = true;
  renderLightbox();
  lightboxOverlay.classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function renderLightbox() {
  const item = filteredData[lbIndex];
  if (!item) return;

  const color = subjectColor(item.Subject);
  lbName.textContent = item.Answer || '—';
  lbSubject.textContent = item.Subject || '';
  lbSubject.style.color = color;

  lbMeta.innerHTML = '';
  if (item.Year)    lbMeta.innerHTML += `<span class="lightbox-meta-chip">📅 ${item.Year}</span>`;
  if (item.Round)   lbMeta.innerHTML += `<span class="lightbox-meta-chip">Round ${item.Round}</span>`;
  if (item.Match)   lbMeta.innerHTML += `<span class="lightbox-meta-chip">Match ${item.Match}</span>`;
  if (item.Section) lbMeta.innerHTML += `<span class="lightbox-meta-chip">${item.Section}</span>`;

  lbInfoBody.innerHTML = item.Info ? marked.parse(item.Info) : '<p style="color:var(--text-faint)">No additional info.</p>';

  // Source toggle buttons
  const srcDiv = document.getElementById('lightboxSrcBtns');
  srcDiv.innerHTML = '';
  if (item.LocalImageUrl) {
    const btnL = document.createElement('button');
    btnL.className = 'src-btn' + (lbUseLocal ? ' active' : '');
    btnL.textContent = 'Local';
    btnL.onclick = () => { lbUseLocal = true; loadLightboxImg(item); renderSrcBtns(item); };
    srcDiv.appendChild(btnL);
  }
  if (item.ImageUrl) {
    const btnW = document.createElement('button');
    btnW.className = 'src-btn' + (!lbUseLocal ? ' active' : '');
    btnW.textContent = 'Web URL';
    btnW.onclick = () => { lbUseLocal = false; loadLightboxImg(item); renderSrcBtns(item); };
    srcDiv.appendChild(btnW);
  }

  loadLightboxImg(item);
}

function renderSrcBtns(item) {
  const srcDiv = document.getElementById('lightboxSrcBtns');
  srcDiv.querySelectorAll('.src-btn').forEach((btn, i) => {
    btn.classList.toggle('active',
      (i === 0 && lbUseLocal && item.LocalImageUrl) ||
      (i === 1 && !lbUseLocal) ||
      (i === 0 && !item.LocalImageUrl && !lbUseLocal)
    );
  });
}

function loadLightboxImg(item) {
  lightboxImg.style.opacity = '0.4';
  const tryUrl  = lbUseLocal && item.LocalImageUrl ? item.LocalImageUrl : (item.ImageUrl || item.LocalImageUrl);
  const fallUrl = item.ImageUrl;
  lightboxImg.onerror = () => {
    if (tryUrl !== fallUrl && fallUrl) {
      lightboxImg.src = fallUrl;
    } else {
      lightboxImg.alt = 'Image unavailable';
    }
  };
  lightboxImg.onload = () => { lightboxImg.style.opacity = '1'; };
  lightboxImg.src = tryUrl;
}

document.getElementById('lightboxClose').onclick = closeLightbox;
document.getElementById('lbPrev').onclick = () => { lbIndex = (lbIndex - 1 + filteredData.length) % filteredData.length; lbUseLocal = true; renderLightbox(); };
document.getElementById('lbNext').onclick = () => { lbIndex = (lbIndex + 1) % filteredData.length; lbUseLocal = true; renderLightbox(); };

lightboxOverlay.addEventListener('click', (e) => { if (e.target === lightboxOverlay) closeLightbox(); });

document.addEventListener('keydown', (e) => {
  if (lightboxOverlay.classList.contains('visible')) {
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { lbIndex = (lbIndex + 1) % filteredData.length; lbUseLocal = true; renderLightbox(); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { lbIndex = (lbIndex - 1 + filteredData.length) % filteredData.length; lbUseLocal = true; renderLightbox(); }
  }
});

function closeLightbox() {
  lightboxOverlay.classList.remove('visible');
  document.body.style.overflow = '';
}

/* ─── FLASHCARD MODE ──────────────────────────────────────────── */
const flashcardOverlay = document.getElementById('flashcardOverlay');

document.getElementById('flashcardBtn').onclick = openFlashcards;
document.getElementById('fcCloseBtn').onclick   = closeFlashcards;

function openFlashcards() {
  fcDeck    = filteredData.length ? [...filteredData] : [...allData];
  fcDeck    = shuffle(fcDeck);
  fcIndex   = 0;
  fcKnew    = 0;
  fcMissed  = 0;
  renderFlashcard();
  flashcardOverlay.classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeFlashcards() {
  flashcardOverlay.classList.remove('visible');
  document.body.style.overflow = '';
}

function renderFlashcard() {
  if (!fcDeck.length) return;
  const item = fcDeck[fcIndex];
  fcRevealed = false;

  // Image
  const fcImg = document.getElementById('fcImage');
  fcImg.style.opacity = '0.4';
  const imgUrl = item.LocalImageUrl || item.ImageUrl;
  fcImg.onerror = () => { if (item.ImageUrl && item.ImageUrl !== imgUrl) fcImg.src = item.ImageUrl; };
  fcImg.onload  = () => { fcImg.style.opacity = '1'; };
  fcImg.src = imgUrl;

  // Prompt (question text)
  document.getElementById('fcPrompt').textContent = item.Question || 'Who is this?';
  document.getElementById('fcRevealBtn').style.display = '';

  // Hide answer
  document.getElementById('fcAnswerRow').style.display = 'none';
  document.getElementById('fcInfoPreview').classList.remove('visible');

  // Progress
  const pct = Math.round((fcIndex / fcDeck.length) * 100);
  document.getElementById('fcProgressBar').style.width = pct + '%';
  document.getElementById('fcProgressText').textContent = (fcIndex + 1) + ' / ' + fcDeck.length;
  document.getElementById('fcKnewCount').textContent   = fcKnew;
  document.getElementById('fcMissedCount').textContent = fcMissed;
}

document.getElementById('fcRevealBtn').onclick = () => {
  if (fcRevealed) return;
  fcRevealed = true;
  const item = fcDeck[fcIndex];
  document.getElementById('fcRevealBtn').style.display = 'none';
  document.getElementById('fcAnswerName').textContent = item.Answer || '—';
  document.getElementById('fcAnswerSub').textContent  = item.Subject || '';
  document.getElementById('fcAnswerRow').style.display = '';

  const fcInfoEl = document.getElementById('fcInfoPreview');
  if (item.Info) {
    fcInfoEl.innerHTML = marked.parse(item.Info);
    fcInfoEl.classList.add('visible');
  }
};

document.getElementById('fcKnewBtn').onclick = () => {
  setProgress(fcDeck[fcIndex].Pkey, 'known');
  fcKnew++;
  nextFlashcard();
};
document.getElementById('fcMissedBtn').onclick = () => {
  setProgress(fcDeck[fcIndex].Pkey, 'review');
  fcMissed++;
  nextFlashcard();
};
document.getElementById('fcSkipBtn').onclick = nextFlashcard;
document.getElementById('fcPrevBtn').onclick = () => {
  if (fcIndex > 0) { fcIndex--; renderFlashcard(); }
};
document.getElementById('fcNextBtn').onclick  = nextFlashcard;

function nextFlashcard() {
  if (fcIndex < fcDeck.length - 1) {
    fcIndex++;
    renderFlashcard();
  } else {
    // End of deck summary
    document.getElementById('fcProgressText').textContent = 'Done!';
    document.getElementById('fcProgressBar').style.width = '100%';
    toast(`Flashcard session complete — Knew: ${fcKnew} | Missed: ${fcMissed}`, 'success');
    closeFlashcards();
  }
}

/* ─── SUBJECT FILTERS ─────────────────────────────────────────── */
function buildSubjectFilters() {
  const subjects = [...new Set(allData.map(d => d.Subject).filter(Boolean))].sort();
  const pills    = document.getElementById('subjectPills');
  const sidebar  = document.getElementById('subjectList');

  pills.innerHTML  = '';
  sidebar.innerHTML = '';

  const allPill = document.createElement('div');
  allPill.className = 'pill active';
  allPill.dataset.subject = 'all';
  allPill.textContent = 'All';
  allPill.style.setProperty('--pill-color', 'var(--text-muted)');
  pills.appendChild(allPill);

  subjects.forEach(sub => {
    const color = subjectColor(sub);
    const count = allData.filter(d => d.Subject === sub).length;

    // Pill
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.dataset.subject = sub;
    pill.textContent = sub;
    pills.appendChild(pill);

    // Sidebar item
    const si = document.createElement('div');
    si.className = 'sidebar-item';
    si.dataset.subject = sub;
    si.innerHTML = `<span class="sidebar-dot" style="background:${color}"></span>${sub}<span class="sidebar-count">${count}</span>`;
    sidebar.appendChild(si);

    // Events
    [pill, si].forEach(el => {
      el.addEventListener('click', () => {
        setSubjectFilter(sub);
      });
    });
  });

  pills.addEventListener('click', (e) => {
    const el = e.target.closest('.pill');
    if (!el) return;
    const sub = el.dataset.subject;
    setSubjectFilter(sub);
  });

  document.getElementById('filterAll').addEventListener('click', () => {
    activeProgress = 'all';
    setSubjectFilter('all');
    updateProgressSidebar();
  });
  document.getElementById('filterKnown').addEventListener('click', () => {
    activeProgress = 'known';
    activeSubject  = 'all';
    updateActiveSubject('all');
    applyFilters();
    updateProgressSidebar();
  });
  document.getElementById('filterReview').addEventListener('click', () => {
    activeProgress = 'review';
    activeSubject  = 'all';
    updateActiveSubject('all');
    applyFilters();
    updateProgressSidebar();
  });
}

function updateProgressSidebar() {
  document.querySelectorAll('#filterKnown,#filterReview,#filterAll').forEach(el => el.classList.remove('active'));
  if (activeProgress === 'known')  document.getElementById('filterKnown').classList.add('active');
  if (activeProgress === 'review') document.getElementById('filterReview').classList.add('active');
  if (activeProgress === 'all')    document.getElementById('filterAll').classList.add('active');
}

function setSubjectFilter(sub) {
  activeSubject  = sub;
  activeProgress = 'all';
  updateActiveSubject(sub);
  applyFilters();
  updateProgressSidebar();
}

function updateActiveSubject(sub) {
  document.querySelectorAll('.pill').forEach(p => {
    const isActive = p.dataset.subject === sub;
    p.classList.toggle('active', isActive);
    const color = subjectColor(p.dataset.subject);
    p.style.background  = isActive ? color : '';
    p.style.color       = isActive ? '#fff' : '';
    p.style.borderColor = isActive ? color  : '';
  });
  document.querySelectorAll('#subjectList .sidebar-item').forEach(si => {
    si.classList.toggle('active', si.dataset.subject === sub);
  });
}

/* ─── ROUND FILTERS ───────────────────────────────────────────── */
function buildRoundFilters() {
  const rounds = [...new Set(allData.map(d => d.Round).filter(Boolean))].sort((a, b) => a - b);
  const roundList = document.getElementById('roundList');
  roundList.innerHTML = '';

  if (!rounds.length) return;

  const allItem = document.createElement('div');
  allItem.className = 'sidebar-item active';
  allItem.textContent = 'All Rounds';
  allItem.onclick = () => { activeRound = 'all'; updateRoundActive(); applyFilters(); };
  roundList.appendChild(allItem);

  rounds.forEach(r => {
    const count = allData.filter(d => String(d.Round) === String(r)).length;
    const si = document.createElement('div');
    si.className = 'sidebar-item';
    si.innerHTML = `<span class="sidebar-dot" style="background:var(--text-faint)"></span>Round ${r}<span class="sidebar-count">${count}</span>`;
    si.dataset.round = r;
    si.onclick = () => { activeRound = String(r); updateRoundActive(); applyFilters(); };
    roundList.appendChild(si);
  });

  function updateRoundActive() {
    roundList.querySelectorAll('.sidebar-item').forEach(si => {
      si.classList.toggle('active',
        (si.dataset.round === undefined && activeRound === 'all') ||
        si.dataset.round === activeRound
      );
    });
  }
}

/* ─── STATS ───────────────────────────────────────────────────── */
function updateStats() {
  const subjects = new Set(allData.map(d => d.Subject).filter(Boolean));
  const knownN   = Object.values(progress).filter(v => v === 'known').length;
  const reviewN  = Object.values(progress).filter(v => v === 'review').length;

  document.getElementById('statTotal').textContent    = allData.length;
  document.getElementById('statSubjects').textContent = subjects.size;
  document.getElementById('statKnown').textContent    = knownN;
  document.getElementById('statReview').textContent   = reviewN;

  updateSidebarCounts();
}

function updateSidebarCounts() {
  const knownN  = Object.values(progress).filter(v => v === 'known').length;
  const reviewN = Object.values(progress).filter(v => v === 'review').length;
  document.getElementById('knownCount').textContent  = knownN;
  document.getElementById('reviewCount').textContent = reviewN;
  document.getElementById('allCount').textContent    = allData.length;
}

/* ─── TOAST ───────────────────────────────────────────────────── */
function toast(msg, type = 'info') {
  const tc = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  tc.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}
